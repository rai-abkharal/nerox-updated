workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "org.reactjs.native.example.Nerox"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install pods
        script: |
          cd ios
          NO_FLIPPER=1 pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace ios/Nerox.xcworkspace \
            --scheme Nerox
    artifacts:
      - build/ios/ipa/*.ipa