workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: org.reactjs.native.example.Nerox
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install pods
        script: |
          cd ios
          NO_FLIPPER=1 pod install
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Create export options
        script: |
          cat > /tmp/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>6ZN7399P3U</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>org.reactjs.native.example.Nerox</key>
              <string>vpn</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Build iOS IPA
        script: |
          xcodebuild \
            -workspace ios/Nerox.xcworkspace \
            -scheme Nerox \
            -configuration Release \
            -archivePath build/Nerox.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=6ZN7399P3U \
            PROVISIONING_PROFILE_SPECIFIER=vpn \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            COMPILER_INDEX_STORE_ENABLE=NO

          xcodebuild \
            -exportArchive \
            -archivePath build/Nerox.xcarchive \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath build/ios/ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log