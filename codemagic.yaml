workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 20
      xcode: 16.4
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: org.reactjs.native.example.Nerox
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Setup PacketTunnel Target
        script: |
          cd ios

          mkdir -p PacketTunnel

          cat > PacketTunnel/PacketTunnel.entitlements << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.networking.networkextension</key>
              <array>
                  <string>packet-tunnel-provider</string>
              </array>
          </dict>
          </plist>
          ENTITLEMENTS

          gem install xcodeproj --quiet

          ruby << 'RUBYSCRIPT'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Nerox.xcodeproj')

          unless project.targets.find { |t| t.name == 'PacketTunnel' }
            target = project.new_target(:app_extension, 'PacketTunnel', :ios, '15.0')

            pt_group = project.main_group.new_group('PacketTunnel', 'PacketTunnel')
            pt_file = pt_group.new_file('PacketTunnelProvider.swift')
            target.source_build_phase.add_file_reference(pt_file)

            wgkit_group = project.main_group.new_group('WireGuardKit', 'WireGuardKit')
            Dir.glob('WireGuardKit/*.swift').each do |f|
              ref = wgkit_group.new_file(File.basename(f))
              target.source_build_phase.add_file_reference(ref)
            end

            wgkitc_group = project.main_group.new_group('WireGuardKitC', 'WireGuardKitC')
            Dir.glob('WireGuardKitC/*.{c,h}').each do |f|
              ref = wgkitc_group.new_file(File.basename(f))
              target.source_build_phase.add_file_reference(ref)
            end

            target.build_configurations.each do |config|
              config.build_settings['SWIFT_VERSION'] = '5.0'
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
              config.build_settings['DEVELOPMENT_TEAM'] = '6ZN7399P3U'
              config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'org.reactjs.native.example.Nerox.PacketTunnel'
              config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'PacketTunnel/PacketTunnel.entitlements'
              config.build_settings['HEADER_SEARCH_PATHS'] = '$(SRCROOT)/WireGuardKitC'
            end

            project.save
            puts 'PacketTunnel with local WireGuardKit added!'
          end
          RUBYSCRIPT

      - name: Install pods
        script: |
          cd ios
          NO_FLIPPER=1 pod install

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Create export options
        script: |
          cat > /tmp/export_options.plist << 'EXPORTOPTIONS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>6ZN7399P3U</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>org.reactjs.native.example.Nerox</key>
                  <string>a73d87ae-dfa9-40a2-b257-f1e05e4ce5a1</string>
              </dict>
          </dict>
          </plist>
          EXPORTOPTIONS

      - name: Build iOS IPA
        script: |
          xcodebuild \
            -workspace ios/Nerox.xcworkspace \
            -scheme Nerox \
            -configuration Release \
            -archivePath build/Nerox.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=6ZN7399P3U \
            PROVISIONING_PROFILE_SPECIFIER="a73d87ae-dfa9-40a2-b257-f1e05e4ce5a1" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            COMPILER_INDEX_STORE_ENABLE=NO

          xcodebuild \
            -exportArchive \
            -archivePath build/Nerox.xcarchive \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false