workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: org.reactjs.native.example.Nerox
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Setup PacketTunnel Target
        script: |
          cd ios

          # 1. Podfile mein platform version 15.0 aur WireGuardKit update karo
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.0'/" Podfile
          echo "" >> Podfile
          echo "target 'PacketTunnel' do" >> Podfile
          echo "  pod 'WireGuardKit'" >> Podfile
          echo "end" >> Podfile

          # 2. Entitlements file banao
          printf '%s' '<?xml version="1.0" encoding="UTF-8"?><plist version="1.0"><dict><key>com.apple.developer.networking.networkextension</key><array><string>packet-tunnel-provider</string></array></dict></plist>' > PacketTunnel/PacketTunnel.entitlements
          echo "Entitlements created!"

          # 3. Xcode project mein PacketTunnel target add karo
          gem install xcodeproj --quiet
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Nerox.xcodeproj')
          if project.targets.find { |t| t.name == 'PacketTunnel' }
            puts 'PacketTunnel target already exists, skipping.'
          else
            target = project.new_target(:app_extension, 'PacketTunnel', :ios, '15.0')
            group = project.main_group.new_group('PacketTunnel', 'PacketTunnel')
            file_ref = group.new_file('PacketTunnelProvider.swift')
            target.source_build_phase.add_file_reference(file_ref)
            target.build_configurations.each do |config|
              config.build_settings['SWIFT_VERSION'] = '5.0'
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
              config.build_settings['DEVELOPMENT_TEAM'] = '6ZN7399P3U'
              config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'org.reactjs.native.example.Nerox.PacketTunnel'
              config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'PacketTunnel/PacketTunnel.entitlements'
              config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'Nerox PacketTunnel'
            end
            project.save
            puts 'PacketTunnel target added successfully!'
          end
          "

      - name: Install pods
        script: |
          cd ios
          NO_FLIPPER=1 pod install

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Create export options
        script: |
          printf '%s' '<?xml version="1.0" encoding="UTF-8"?><plist version="1.0"><dict><key>method</key><string>app-store</string><key>teamID</key><string>6ZN7399P3U</string><key>signingStyle</key><string>manual</string><key>provisioningProfiles</key><dict><key>org.reactjs.native.example.Nerox</key><string>a73d87ae-dfa9-40a2-b257-f1e05e4ce5a1</string><key>org.reactjs.native.example.Nerox.PacketTunnel</key><string>Nerox PacketTunnel</string></dict></dict></plist>' > /tmp/export_options.plist
          echo "Export options created!"

      - name: Build iOS IPA
        script: |
          xcodebuild \
            -workspace ios/Nerox.xcworkspace \
            -scheme Nerox \
            -configuration Release \
            -archivePath build/Nerox.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=6ZN7399P3U \
            PROVISIONING_PROFILE_SPECIFIER="a73d87ae-dfa9-40a2-b257-f1e05e4ce5a1" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            COMPILER_INDEX_STORE_ENABLE=NO

          xcodebuild \
            -exportArchive \
            -archivePath build/Nerox.xcarchive \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log