workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: org.reactjs.native.example.Nerox
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Setup PacketTunnel Target
        script: |
          cd ios
          
          # 1. Update main platform to iOS 15.0 for WireGuardKit compatibility
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.0'/" Podfile
          
          # 2. Add PacketTunnel target with WireGuardKit from GitHub
          cat >> Podfile << 'EOF'

target 'PacketTunnel' do
  platform :ios, '15.0'
  pod 'WireGuardKit', :git => 'https://github.com/WireGuard/wireguard-apple.git', :tag => '1.1.3'
end
EOF
          
          echo "✅ Podfile updated with PacketTunnel target"
          cat Podfile
          
          # 3. Create PacketTunnel directory
          mkdir -p PacketTunnel
          
          # 4. Create entitlements file
          cat > PacketTunnel/PacketTunnel.entitlements << 'ENTITLEMENTS'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>com.apple.developer.networking.networkextension</key>
    <array>
        <string>packet-tunnel-provider</string>
    </array>
</dict>
</plist>
ENTITLEMENTS
          
          echo "✅ Entitlements file created"
          
          # 5. Install xcodeproj gem
          gem install xcodeproj --quiet
          
          # 6. Add PacketTunnel target to Xcode project
          ruby << 'RUBYSCRIPT'
require 'xcodeproj'

project_path = 'Nerox.xcodeproj'
project = Xcodeproj::Project.open(project_path)

# Check if target already exists
if project.targets.find { |t| t.name == 'PacketTunnel' }
  puts '⚠️  PacketTunnel target already exists, skipping creation.'
else
  puts '🔧 Creating PacketTunnel target...'
  
  # Create new App Extension target
  target = project.new_target(:app_extension, 'PacketTunnel', :ios, '15.0')
  
  # Create group for PacketTunnel files
  group = project.main_group.new_group('PacketTunnel', 'PacketTunnel')
  
  # Add PacketTunnelProvider.swift file reference
  file_ref = group.new_file('PacketTunnelProvider.swift')
  target.source_build_phase.add_file_reference(file_ref)
  
  # Configure build settings for both Debug and Release
  target.build_configurations.each do |config|
    config.build_settings['SWIFT_VERSION'] = '5.0'
    config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
    config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
    config.build_settings['DEVELOPMENT_TEAM'] = '6ZN7399P3U'
    config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'org.reactjs.native.example.Nerox.PacketTunnel'
    config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'PacketTunnel/PacketTunnel.entitlements'
    config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'Nerox PacketTunnel'
  end
  
  # Save project
  project.save
  puts '✅ PacketTunnel target created successfully!'
end
RUBYSCRIPT

      - name: Install pods
        script: |
          cd ios
          
          # Clear CocoaPods cache for clean install
          echo "🧹 Cleaning CocoaPods cache..."
          pod cache clean --all
          rm -rf Pods
          
          # Install pods with repo update
          echo "📦 Installing CocoaPods dependencies..."
          NO_FLIPPER=1 pod install --repo-update --verbose

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Create export options
        script: |
          cat > /tmp/export_options.plist << 'EXPORTOPTIONS'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>app-store</string>
    <key>teamID</key>
    <string>6ZN7399P3U</string>
    <key>signingStyle</key>
    <string>manual</string>
    <key>provisioningProfiles</key>
    <dict>
        <key>org.reactjs.native.example.Nerox</key>
        <string>a73d87ae-dfa9-40a2-b257-f1e05e4ce5a1</string>
        <key>org.reactjs.native.example.Nerox.PacketTunnel</key>
        <string>Nerox PacketTunnel</string>
    </dict>
</dict>
</plist>
EXPORTOPTIONS
          
          echo "✅ Export options created"

      - name: Build iOS IPA
        script: |
          xcodebuild \
            -workspace ios/Nerox.xcworkspace \
            -scheme Nerox \
            -configuration Release \
            -archivePath build/Nerox.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=6ZN7399P3U \
            PROVISIONING_PROFILE_SPECIFIER="a73d87ae-dfa9-40a2-b257-f1e05e4ce5a1" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            COMPILER_INDEX_STORE_ENABLE=NO

          xcodebuild \
            -exportArchive \
            -archivePath build/Nerox.xcarchive \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log